name: RemoteKeyboard
options:
  bundleIdPrefix: com.remotekeyboard
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true
  developmentLanguage: ko
  knownRegions:
    - ko
    - en
    - Base

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:

  # ─── 메인 앱 (iPhone + iPad 유니버셜) ───────────────────────────────────────
  RemoteKeyboard:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: RemoteKeyboard
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
      - path: SharedKit/Sources
    resources:
      - RemoteKeyboard/Resources
      - path: RemoteKeyboard/Resources/ko.lproj
        type: folder
      - path: RemoteKeyboard/Resources/en.lproj
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remotekeyboard.app
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: RemoteKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: RemoteKeyboard/RemoteKeyboard.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: RemoteKeyboard/Info.plist
      properties:
        CFBundleDisplayName: ipad keyboard
        CFBundleIconName: AppIcon
        NSLocalNetworkUsageDescription: "ipad keyboard는 iPhone과 iPad를 연결하기 위해 로컬 네트워크를 사용합니다."
        NSUserTrackingUsageDescription: "맞춤형 광고 제공을 위해 기기 식별자에 접근합니다. 거부해도 앱 사용에 영향 없습니다."
        GADApplicationIdentifier: ca-app-pub-5484293743122557~8701567421
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: 5a6flpkh64.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: 3qy4746246.skadnetwork
          - SKAdNetworkIdentifier: 3sh42y64l3.skadnetwork
          - SKAdNetworkIdentifier: f38h382jlk.skadnetwork
          - SKAdNetworkIdentifier: hs6bdukanm.skadnetwork
          - SKAdNetworkIdentifier: prcb7njmu6.skadnetwork
          - SKAdNetworkIdentifier: v4nxqhlyqp.skadnetwork
          - SKAdNetworkIdentifier: wzmmz9fp6w.skadnetwork
          - SKAdNetworkIdentifier: s39g8k73mm.skadnetwork
          - SKAdNetworkIdentifier: 4468km3ulz.skadnetwork
          - SKAdNetworkIdentifier: 2u9pt9hc89.skadnetwork
          - SKAdNetworkIdentifier: 8s468mfl3y.skadnetwork
          - SKAdNetworkIdentifier: av6w8kgt66.skadnetwork
          - SKAdNetworkIdentifier: klf5c3l5u5.skadnetwork
        NSBonjourServices:
          - _remotekb._tcp
          - _remotekb._udp
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    entitlements:
      path: RemoteKeyboard/RemoteKeyboard.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.remotekeyboard
    dependencies:
      - target: RemoteKeyboardExtension
        embed: true
      - package: GoogleMobileAds

  # ─── 키보드 익스텐션 ─────────────────────────────────────────────────────────
  RemoteKeyboardExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: RemoteKeyboardExtension
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
      - path: SharedKit/Sources
    resources:
      - path: RemoteKeyboardExtension/Resources/ko.lproj
        type: folder
      - path: RemoteKeyboardExtension/Resources/en.lproj
        type: folder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remotekeyboard.app.keyboard
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: RemoteKeyboardExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: RemoteKeyboardExtension/RemoteKeyboardExtension.entitlements
    info:
      path: RemoteKeyboardExtension/Info.plist
      properties:
        CFBundleDisplayName: ipad keyboard
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: false
            PrefixesBeforeExistingWord: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: true
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController
    entitlements:
      path: RemoteKeyboardExtension/RemoteKeyboardExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.remotekeyboard

  # ─── 유닛 테스트 ──────────────────────────────────────────────────────────────
  RemoteKeyboardTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: RemoteKeyboardTests
      - path: SharedKit/Sources
    dependencies:
      - target: RemoteKeyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.remotekeyboard.app.tests
        GENERATE_INFOPLIST_FILE: YES
